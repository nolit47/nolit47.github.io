<!DOCTYPE html>
<html>
<head>
  <title>%</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .tile {
        position: absolute;
        background-size: cover;
        background-position: center;
        image-rendering: pixelated;
        pointer-events: none;
    }

    #blackout {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      z-index: 50;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #teetheye {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 420px;
      max-width: 90vw;
      opacity: 0;
      z-index: 60;
      pointer-events: none;
      transition: opacity 20s ease;
      animation: fakeneyeshake 0.01s infinite alternate;
    }

    @keyframes fakeneyeshake {
      from { transform: translate(calc(-50% - 3px), calc(-50% - 2px)); }
      to   { transform: translate(calc(-50% + 3px), calc(-50% + 2px)); }
    }

    #lyrics-stack {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .lyric-line {
      font-family: Arial, sans-serif;
      font-size: 128px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      letter-spacing: 0.06em;
      white-space: nowrap;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .lyric-line.side {
      position: fixed;
      top: auto;
      left: auto;
    }

    .lyric-line span {
      display: inline-block;
      animation: shakeLetter 0.08s infinite alternate;
    }

    @keyframes shakeLetter {
      from { transform: translate(0, 0); }
      to   { transform: translate(var(--sx), var(--sy)); }
    }

    .btn {
      position: fixed;
      background: #000000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 13px;
      padding: 16px 28px;
      cursor: pointer;
      z-index: 10;
    }

    .btn:hover { background: #ff0000; }

    #score {
      position: fixed;
      top: 10px;
      right: 14px;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 20;
    }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="blackout"></div>
<img id="teetheye" src="stuff/teetheye.webp" alt="">
<div id="lyrics-stack"></div>
<div id="score">0</div>

<audio id="snd" src="stuff/snd/killtheblind.wav" loop></audio>
<audio id="sob" src="stuff/snd/haalol.wav" loop></audio>

<script>

  var bgs = [
    'stuff/teeth1.webp',
    'stuff/teeth2.webp',
    'stuff/teeth3.webp',
    'stuff/teeth4.webp',
  ];

  var TILE_SIZE = 120;
  var bgEl = document.getElementById('bg');
  var tiles = [];

  function xqvrmt() {
    bgEl.innerHTML = '';
    tiles = [];
    var cols = Math.ceil(window.innerWidth  / TILE_SIZE) + 1;
    var rows = Math.ceil(window.innerHeight / TILE_SIZE) + 1;

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var t = document.createElement('div');
        t.className = 'tile';
        t.style.width  = TILE_SIZE + 'px';
        t.style.height = TILE_SIZE + 'px';
        t.style.left   = (c * TILE_SIZE) + 'px';
        t.style.top    = (r * TILE_SIZE) + 'px';
        t.style.backgroundImage = "url('" + bgs[Math.floor(Math.random() * bgs.length)] + "')";
        bgEl.appendChild(t);
        tiles.push({ el: t, ox: c * TILE_SIZE, oy: r * TILE_SIZE });
      }
    }
  }

  xqvrmt();
  window.addEventListener('resize', xqvrmt);

  function bnzwqk() {
    for (var i = 0; i < tiles.length; i++) {
      var dx = (Math.random() * 40 - 20);
      var dy = (Math.random() * 40 - 20);
      tiles[i].el.style.transform = 'translate(' + dx.toFixed(1) + 'px,' + dy.toFixed(1) + 'px)';
    }
    requestAnimationFrame(bnzwqk);
  }
  bnzwqk();

  setInterval(function() {
    for (var i = 0; i < tiles.length; i++) {
      tiles[i].el.style.backgroundImage = "url('" + bgs[Math.floor(Math.random() * bgs.length)] + "')";
    }
  }, 100);

  var blacked = false;

  var snd = document.getElementById('snd');
  var sob = document.getElementById('sob');
  snd.volume = 1.0;
  sob.volume = 1.0;

  snd.play().catch(function() {
    document.addEventListener('click', function go() {
      snd.play().catch(function(){});
      document.removeEventListener('click', go);
    });
  });

  var lyrics = [
    { t: 0.23,  text: "MY BODY",        side: null },
    { t: 1.10,  text: "IS WHISTLING",   side: null },
    { t: 4.00,  text: "KILL THE BLIND", side: 'left'  },
    { t: 4.69,  text: "KILL THE BLIND", side: 'right' },
    { t: 5.30,  text: "KILL THE BLIND", side: 'left'  },
    { t: 6.20,  text: "KILL THE BLIND", side: 'right' },
    { t: 8.00,  text: "MY BODY",        side: null },
    { t: 9.20,  text: "IS RETENTION",   side: null },
    { t: 15.00, text: "MY BODY",        side: null },
    { t: 16.32, text: "IS WITHIN",      side: null }
  ];

  var SONG_LEN  = 21;
  var HOLD_MS   = 8000;
  var CHAR_MS   = 55;
  var lastShown = -1;
  var stack     = document.getElementById('lyrics-stack');
  var sideCount = { left: 0, right: 0 };

  function plvxjfd(text, side) {
    var line = document.createElement('div');
    line.className = 'lyric-line';

    if (side) {
      line.classList.add('side');
      var topVal = 20 + sideCount[side] * 140;
      line.style.top = topVal + 'px';
      line.style.textAlign = side;
      if (side === 'left') { line.style.left = '18px'; }
      else                 { line.style.right = '18px'; }
      sideCount[side]++;
      document.body.appendChild(line);
    } else {
      stack.appendChild(line);
    }

    var chars = text.split('');
    chars.forEach(function(ch, i) {
      setTimeout(function() {
        if (ch === ' ') { line.appendChild(document.createTextNode('\u00A0')); return; }
        var span = document.createElement('span');
        span.textContent = ch;
        span.style.setProperty('--sx', (Math.random() * 4 - 2).toFixed(2) + 'px');
        span.style.setProperty('--sy', (Math.random() * 4 - 2).toFixed(2) + 'px');
        span.style.animationDelay = (Math.random() * 0.08).toFixed(3) + 's';
        line.appendChild(span);
      }, i * CHAR_MS);
    });

    var totalTypeTime = chars.length * CHAR_MS;
    setTimeout(function() {
      line.style.opacity = '0';
      setTimeout(function() { if (line.parentNode) line.parentNode.removeChild(line); }, 400);
    }, totalTypeTime + HOLD_MS);
  }

  function gwrbnzx() {
    var t = snd.currentTime % SONG_LEN;
    var active = -1;
    for (var i = 0; i < lyrics.length; i++) { if (t >= lyrics[i].t) active = i; }
    if (active !== -1 && active !== lastShown) {
      lastShown = active;
      plvxjfd(lyrics[active].text, lyrics[active].side);
    }
    requestAnimationFrame(gwrbnzx);
  }

  snd.addEventListener('play', function() { lastShown = -1; sideCount = { left: 0, right: 0 }; });
  gwrbnzx();

  var caught  = 0;
  var scoreEl = document.getElementById('score');
  var buttons = [];

  function vkqzmzr() {
    if (blacked) return;
    blacked = true;

    snd.pause();
    snd.currentTime = 0;

    var blackout = document.getElementById('blackout');
    blackout.style.pointerEvents = 'all';
    blackout.style.opacity = '1';

    var eye = document.getElementById('teetheye');

    setTimeout(function() {
      sob.play().catch(function(){});
      eye.getBoundingClientRect();
      eye.style.opacity = '1';

      setTimeout(function() {
        window.location.href = 'unfortunate.html';
      }, 5000);

    }, 5000);
  }

  function jhwplxv(el) {
    var w = el.offsetWidth  || 80;
    var h = el.offsetHeight || 30;
    el.style.left = (Math.random() * (window.innerWidth  - w - 10) + 5) + 'px';
    el.style.top  = (Math.random() * (window.innerHeight - h - 10) + 5) + 'px';
  }

  function fzntqwb() {
    var btn = document.createElement('button');
    btn.className   = 'btn';
    btn.textContent = '%';
    jhwplxv(btn);
    document.body.appendChild(btn);
    buttons.push(btn);

    btn.addEventListener('click', function() {
      caught++;
      scoreEl.textContent = caught;
      jhwplxv(btn);
      vkqzmzr();
    });
  }

  for (var i = 0; i < 10; i++) fzntqwb();

  setInterval(function() {
    if (!blacked) jhwplxv(buttons[Math.floor(Math.random() * buttons.length)]);
  }, 10000);

</script>
</body>
</html>
