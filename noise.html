<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>doomsday</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      cursor: none;
    }

    #noise {
      position: fixed;
      inset: 0;
      background-image: url('stuff/tv.gif');
      background-repeat: repeat;
      background-size: 300px 300px;
    }

    #back {
      position: fixed;
      top: 16px;
      left: 20px;
      font-family: 'Jersey 10', monospace;
      font-size: 20px;
      color: #ffffff;
      background: rgba(0,0,0,0.5);
      border: 1px solid #ffffff;
      padding: 5px 14px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      z-index: 10;
      transition: background 0.15s;
    }
    #back:hover { background: rgba(0,0,0,0.85); }

    #countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-family: Arial, sans-serif;
      font-size: 52px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.05em;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>

  <div id="noise"></div>
  <a id="back" href="index.html">&#9664; Back</a>
  <div id="countdown"></div>

  <audio id="snd" src="stuff/snd/tvnoise.wav" loop autoplay></audio>

  <script>
    const snd = document.getElementById('snd');
    snd.volume = 1.0;
    document.addEventListener('click', () => {
      if (snd.paused) snd.play().catch(() => {});
    }, { once: true });

    const target = new Date('2032-08-23T00:00:00');

    function pad(n, len = 2) {
      return String(Math.floor(n)).padStart(len, '0');
    }

    function tick() {
      const diff = target - new Date();
      if (diff <= 0) { document.getElementById('countdown').textContent = '0000:00:00:00'; return; }
      const days  = Math.floor(diff / 86400000);
      const hours = Math.floor((diff % 86400000) / 3600000);
      const mins  = Math.floor((diff % 3600000) / 60000);
      const secs  = Math.floor((diff % 60000) / 1000);
      document.getElementById('countdown').textContent =
        `${pad(days, 4)}:${pad(hours)}:${pad(mins)}:${pad(secs)}`;
    }

    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
